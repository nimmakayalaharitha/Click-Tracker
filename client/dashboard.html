<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Tracker Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <h1>Click Analytics Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h2>Total Clicks</h2>
            <p id="totalClicks">0</p>
        </div>

        <div class="card">
            <h2>Login Clicks</h2>
            <p id="loginClicks">0</p>
        </div>

        <div class="card">
            <h2>Register Clicks</h2>
            <p id="registerClicks">0</p>
        </div>

        <div class="card">
            <h2>Card Clicks</h2>
            <p id="cardClicks">0</p>
        </div>

        <div class="card">
            <h2>Empty Space</h2>
            <p id="emptyClicks">0</p>
        </div>

    </div>

    <script src="dashboard.js"></script>

</body>
</html>
